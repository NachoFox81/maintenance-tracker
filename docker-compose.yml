services:
  mongodb:
    image: mongo:7
    container_name: doorloop-assessment-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: doorloop_assessment
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - assessment-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: doorloop-assessment-backend
    restart: unless-stopped
    ports:
      - '3001:3001'
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongodb:27017/doorloop_assessment}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-for-assessment}
      JWT_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    networks:
      - assessment-network

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: doorloop-assessment-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      VITE_API_URL: /api
    depends_on:
      - backend
    networks:
      - assessment-network

volumes:
  mongodb_data:

networks:
  assessment-network:
    driver: bridge
