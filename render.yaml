services:
  - type: web
    name: maintenance-tracker-api
    runtime: node
    plan: free
    branch: main
    healthCheckPath: /health
    buildCommand: npm install && npm run build --workspace=apps/backend
    startCommand: npm run start --workspace=apps/backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
    buildFilter:
      paths:
        - apps/backend/**
        - libs/shared/**
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - render.yaml
